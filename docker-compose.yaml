version: '3.8'

services:
    db:
        image: postgres:18
        container_name: arsip-smk-mandiri-db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
            POSTGRES_DB: ${DB_DATABASE:-arsip_smk_mandiri_app_develop}
        ports:
            - '5433:5432'
        volumes:
            - 'D:/program/docker/postgres-data:/var/lib/postgresql'

    mailpit:
        image: 'axllent/mailpit:latest'
        container_name: arsip-smk-mandiri-mailpit
        ports:
            - '1025:1025'
            - '8025:8025'
        restart: always
version: '3.8'

services:
    db:
        image: postgres:18
        container_name: arsip-smk-mandiri-db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
            POSTGRES_DB: ${DB_DATABASE:-arsip_smk_mandiri_app_develop}
        ports:
            - '5433:5432'
        volumes:
            - 'D:/program/docker/postgres-data:/var/lib/postgresql'

    garage:
        image: dxflrs/garage:v2.1.0
        container_name: arsip-smk-mandiri-garage
        restart: always
        ports:
            - '3900:3900'
            - '3902:3902'
            - '3903:3903'
        volumes:
            - 'D:/program/docker/garage-storage/config/garage.toml:/etc/garage.toml'
            - 'D:/program/docker/garage-storage/data:/var/lib/garage/data'
            - 'D:/program/docker/garage-storage/meta:/var/lib/garage/meta'

name: Deploy Arsip SMK Mandiri

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Deploy to aaPanel VPS via SSH
      uses: appleboy/ssh-action@master
      env:
        ENV_PROD: ${{ secrets.ENV_PROD }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: ENV_PROD
        script: |
          cd /www/wwwroot/arsip-laravel
          git pull origin staging
          
          # Menyuntikkan Github Secrets ENV_PROD ke file .env di VPS
          echo "$ENV_PROD" > .env
          
          # Build ulang dan jalankan container production
          # Menambahkan -V untuk membersihkan volume anonim/public_data lama jika ada update aset Vite
          docker-compose -f docker-compose.production.yml up -d --build --force-recreate -V
          
          # Jalankan optimasi Laravel di dalam container (Asumsi nama service adalah 'app')
          docker-compose -f docker-compose.production.yml exec -T app php artisan config:cache
          docker-compose -f docker-compose.production.yml exec -T app php artisan route:cache
          docker-compose -f docker-compose.production.yml exec -T app php artisan view:cache
          
          # Jalankan database migration otomatis
          docker-compose -f docker-compose.production.yml exec -T app php artisan migrate --force
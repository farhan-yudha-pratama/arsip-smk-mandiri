name: Deploy Arsip SMK Mandiri

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Deploy to aaPanel VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /www/wwwroot/arsip-laravel
          git pull origin staging
          docker-compose up -d --build
          
          # Jalankan optimasi Laravel di dalam container (Asumsi nama service adalah 'app')
          # Sesuaikan 'app' dengan nama service PHP/Laravel Anda di docker-compose.yml
          docker-compose exec -T app php artisan config:cache
          docker-compose exec -T app php artisan route:cache
          docker-compose exec -T app php artisan view:cache
          
          # Jalankan database migration otomatis
          docker-compose exec -T app php artisan migrate --force
server {
    listen 80;
    index index.php index.html;
    server_name _;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Optimalisasi keamanan (sembunyikan versi nginx)
    server_tokens off;

    # Gzip Compression untuk performa yang lebih baik
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache untuk aset statis (Frontend/Vite build assets)
    location ~* \.(?:css|js|map|jpe?g|gif|png|webp|svgz?|woff2?|eot|ttf|otf|mp4|ico)$ {
        expires off;
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Penanganan root domain untuk Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass request PHP ke service aplikasi ('app' pada docker-compose)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Mengarah ke kontainer aplikasi Laravel (service: app, port: 9000)
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Tolak akses ke file tersembunyi (misal: .env, .git)
    location ~ /\. {
        deny all;
    }
}
